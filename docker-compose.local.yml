services:
  postgres:
    image: postgres:17-alpine
    container_name: btc-paper-postgres-local
    environment:
      POSTGRES_DB: paper_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paper_trading"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    container_name: btc-paper-redis-local
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  matching-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.server
      target: matching-service
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/paper_trading
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8788:8788"
    volumes:
      - ./data/logs:/app/data/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8788/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  app-server:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.server
      target: app-server
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/paper_trading
      REDIS_URL: redis://redis:6379
      MATCHING_SERVICE_URL: http://matching-service:8788
      EMBEDDED_MATCHING_SERVICE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      matching-service:
        condition: service_healthy
    ports:
      - "8787:8787"
    volumes:
      - ./data/logs:/app/data/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/health"]
      interval: 10s
      timeout: 5s
      retries: 12
